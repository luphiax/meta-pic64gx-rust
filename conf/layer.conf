# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "pic64gx-rust"
BBFILE_PATTERN_pic64gx-rust = "^${LAYERDIR}/"
BBFILE_PRIORITY_pic64gx-rust = "6"
LAYERDIR_pic64gx_rust = "${LAYERDIR}"

LAYERDEPENDS_pic64gx-rust = "core mchp-common-distro meta-mchp-pic64-bsp zephyrcore"
LAYERSERIES_COMPAT_pic64gx-rust = "scarthgap"
